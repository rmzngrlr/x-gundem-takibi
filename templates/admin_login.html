{% set hide_navbar = True %}
{% extends "base.html" %}

{% block title %}Süper Admin Girişi{% endblock %}

{% block head %}
<style>
    .login-container {
        min-height: 80vh;
        display: flex;
        align-items: center;
        justify-content: center;
    }
    .login-card {
        width: 100%;
        max-width: 400px;
        padding: 30px;
    }
</style>
{% endblock %}

{% block content %}
<div class="login-container">
    <div class="card login-card">
        <div class="text-center mb-4">
            <img src="/static/ikon.png" alt="Logo" width="60" class="mb-3 rounded">
            <h4 class="fw-bold">Süper Admin</h4>
            <p class="text-muted small">Lütfen yetkili bilgilerinizi girin.</p>
        </div>

        <form method="POST" onsubmit="showLoading()">
            <div class="mb-3">
                <label class="form-label">Kullanıcı Adı</label>
                <input type="text" name="username" class="form-control" placeholder="admin" required>
            </div>
            <div class="mb-4">
                <label class="form-label">Şifre</label>
                <input type="password" name="password" class="form-control" placeholder="••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 fw-bold">Giriş Yap</button>
        </form>
    </div>
</div>
{% endblock %}
