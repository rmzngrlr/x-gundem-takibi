version: '3.8'

services:
  xgundem_app:
    build: .
    container_name: xgundem_container
    restart: unless-stopped
    ports:
      - "3010:3010"
      - "5900:5900"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - PYTHONUNBUFFERED=1
      # Linux üzerinde çalışan Docker için ana makineye (host) erişim adresi
      - DB_HOST=host.docker.internal
      - DB_PORT=3306
    volumes:
      # Veritabanı ve profil kalıcılığı için temp klasörlerini host'ta tutabiliriz
      # (Opsiyonel ama chrome profillerinin kaybolmaması için iyi olabilir)
      - ./.env:/app/.env
